<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume | Dillon Cooley</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #333; }
        object { width: 100%; height: 100vh; display: block; border: none; }
        .back-link {
            position: fixed;
            top: 14px;
            left: 14px;
            color: #fff;
            background: rgba(0, 0, 0, 0.55);
            text-decoration: none;
            padding: 5px 12px;
            border-radius: 6px;
            font-family: sans-serif;
            font-size: 0.875rem;
            z-index: 10;
            transition: background 0.2s ease;
        }
        .back-link:hover { background: rgba(0, 0, 0, 0.8); }
        .pdf-fallback {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: #fff;
            font-family: sans-serif;
            gap: 12px;
        }
        .pdf-fallback a { color: #00a8ff; }
    </style>
</head>
<body>
    <a href="/" class="back-link">← Back</a>
    <object data="resume.pdf" type="application/pdf">
        <div class="pdf-fallback">
            <p>Your browser cannot display PDFs.</p>
            <a href="resume.pdf" download>Download PDF</a>
        </div>
    </object>
</body>
</html>
